name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

# Release builds do not need to materialize fixture media. Keeping LFS blobs as
# pointers also prevents GoReleaser's dirty-tree check from seeing a smudged
# tracked PNG as a local modification.
env:
  GIT_LFS_SKIP_SMUDGE: "1"

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Disable LFS filters for release source tree
        run: |
          git config --local filter.lfs.process ""
          git config --local filter.lfs.smudge cat
          git config --local filter.lfs.clean cat

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Release
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
