name: ci

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Check formatting
        run: |
          files="$(gofmt -l $(find . -name '*.go' -not -path './dist/*'))"
          if [ -n "$files" ]; then
            echo "$files"
            exit 1
          fi

      - name: Check whitespace
        run: git diff --check

      - name: Test
        run: go test ./...
