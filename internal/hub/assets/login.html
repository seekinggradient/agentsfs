{{define "title"}}sign in · agentsfs hub{{end}}
{{define "content"}}
<main class="login-wrap">
  <div class="login-card">
    <p class="eyebrow">agentsfs hub</p>
    <h1 style="font-family:var(--serif);font-weight:600;margin:0 0 0.2rem">Sign in</h1>
    <p style="color:var(--muted);font-size:0.9rem;margin:0">Welcome back.</p>
    <form method="post" action="/login">
      <input type="hidden" name="next" value="{{.Next}}">
      <label>Username</label>
      <input name="user" value="{{.LoginUser}}" autocomplete="username" spellcheck="false" autofocus>
      <label>Password</label>
      <input name="password" type="password" autocomplete="current-password">
      <button class="btn" type="submit">Sign in</button>
      {{if .Error}}<div class="login-err">{{.Error}}</div>{{end}}
    </form>
    {{if .SignupOpen}}<p class="login-alt">New here? <a href="/signup{{if .Next}}?next={{.Next}}{{end}}">Create an account</a></p>{{end}}
    <p class="login-alt ghost" style="margin-top:.4rem">A git access token also works as your password here.</p>
  </div>
</main>
{{end}}
