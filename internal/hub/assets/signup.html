{{define "title"}}sign up · agentsfs hub{{end}}
{{define "content"}}
<main class="login-wrap">
  <div class="login-card">
    <p class="eyebrow">agentsfs hub</p>
    <h1 style="font-family:var(--serif);font-weight:600;margin:0 0 0.2rem">Create your account</h1>
    <p style="color:var(--muted);font-size:0.9rem;margin:0">Your username becomes your namespace: <code>/&lt;username&gt;/&lt;repo&gt;</code>.</p>
    <form method="post" action="/signup">
      <input type="hidden" name="next" value="{{.Next}}">
      <label>Username</label>
      <input name="user" value="{{.LoginUser}}" autocomplete="username" spellcheck="false" placeholder="jane-doe" autofocus>
      <label>Email <span class="ghost">(optional)</span></label>
      <input name="email" value="{{.Email}}" type="email" autocomplete="email" spellcheck="false">
      <label>Password <span class="ghost">(8+ characters)</span></label>
      <input name="password" type="password" autocomplete="new-password">
      <button class="btn" type="submit">Create account</button>
      {{if .Error}}<div class="login-err">{{.Error}}</div>{{end}}
    </form>
    <p class="login-alt">Already have an account? <a href="/login{{if .Next}}?next={{.Next}}{{end}}">Sign in</a></p>
  </div>
</main>
{{end}}
