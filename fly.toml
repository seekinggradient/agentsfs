# agentsfs Hub on Fly.io — Option A: a real git server with a persistent
# volume for the bare repos and Git LFS objects. Cloudflare R2 is wired in
# later for durable backup + object-storage-backed LFS; Fly runs the always-on
# stateful git compute.
#
# First-time setup (see deploy/README.md); this file lives at the repo root so
# the build context is the Go module root and `deploy/Dockerfile` resolves:
#   fly apps create agentsfs-hub --org personal
#   fly volumes create afs_hub_data --size 1 --region sjc --app agentsfs-hub --yes
#   fly secrets set AFS_HUB_TOKENS="akshay:<token>" --app agentsfs-hub --stage
#   fly deploy --app agentsfs-hub --remote-only
#
# `app` must be globally unique on Fly.
app = "agentsfs-hub"
primary_region = "sjc"

[build]
  dockerfile = "deploy/Dockerfile"

[http_service]
  internal_port = 8080
  force_https = true
  # Suspend when idle and wake on the next request — cheap for a personal hub.
  auto_stop_machines = "suspend"
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    method = "GET"
    path = "/healthz"
    interval = "15s"
    timeout = "2s"
    grace_period = "3s"

# The bare repos and LFS objects live here and must persist across
# deploys/restarts.
[[mounts]]
  source = "afs_hub_data"
  destination = "/data"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
