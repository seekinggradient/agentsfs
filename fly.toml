# agentsfs Hub on Fly.io — Option A: a real git server with a persistent
# volume for the bare repos. Cloudflare R2 is wired in later (Phase 3) for
# durable backup + LFS; Fly runs the always-on stateful git compute.
#
# First-time setup (see deploy/README.md for the full walkthrough):
#   fly launch --no-deploy --copy-config --name afs-hub-<unique>
#   fly volumes create afs_hub_data --size 1 --region sjc
#   fly secrets set AFS_HUB_TOKENS="akshay:$(openssl rand -hex 20)"
#   fly deploy
#
# `app` must be globally unique on Fly; change it (or pass --name) if taken.
app = "afs-hub"
primary_region = "sjc"

[build]
  dockerfile = "deploy/Dockerfile"

[http_service]
  internal_port = 8080
  force_https = true
  # Suspend when idle and wake on the next request — cheap for a personal hub.
  auto_stop_machines = "suspend"
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    method = "GET"
    path = "/healthz"
    interval = "15s"
    timeout = "2s"
    grace_period = "3s"

# The bare repos live here and must persist across deploys/restarts.
[[mounts]]
  source = "afs_hub_data"
  destination = "/data"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
